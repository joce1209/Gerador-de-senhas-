<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Senha</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="parametro-senha">
    <h4 class="parametro-senha__titulo">Número de caracteres</h4>

    <div class="parametro-senha-botoes">
      <button class="parametro-senha__botao" id="menos">-</button>

      <span class="parametro-senha__texto" id="valor">12</span>

      <button class="parametro-senha__botao" id="mais">+</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
